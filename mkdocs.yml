site_name: Compositional Sparse OOD
site_description: "Code for: Stop Probing, Start Coding"
repo_url: https://github.com/shrutij01/compositional-sparse-ood

theme:
  name: material
  palette:
    scheme: default

nav:
  - Home: index.md
  - API Reference: api.md
  - Data Generation: data.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
